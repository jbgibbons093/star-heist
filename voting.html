<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Heist Voting</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; font-family: 'Courier New', monospace; }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.7);
  }

  .voting-panel {
    background: rgba(10, 10, 30, 0.95);
    border: 2px solid rgba(255, 200, 0, 0.5);
    border-radius: 12px;
    padding: 20px;
    width: 700px;
    max-height: 520px;
    overflow-y: auto;
  }

  .header {
    text-align: center;
    margin-bottom: 16px;
  }
  .header h1 {
    color: #FFAA00;
    font-size: 22px;
    margin-bottom: 4px;
  }
  .header .reason {
    color: #aaa;
    font-size: 13px;
  }
  .header .timer {
    color: #FF4444;
    font-size: 28px;
    font-weight: bold;
    margin-top: 6px;
  }
  .header .timer.warning { animation: pulse 1s infinite; }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .player-card {
    background: rgba(30, 30, 60, 0.8);
    border: 1px solid rgba(100, 100, 200, 0.3);
    border-radius: 8px;
    padding: 10px;
    text-align: center;
  }
  .player-card.dead {
    opacity: 0.4;
    border-color: rgba(100, 0, 0, 0.3);
  }
  .player-card.voted-for {
    border-color: rgba(255, 200, 0, 0.6);
    background: rgba(60, 50, 0, 0.5);
  }

  .player-name {
    color: #ddd;
    font-size: 13px;
    font-weight: bold;
    margin-bottom: 6px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .player-card.dead .player-name { color: #666; text-decoration: line-through; }

  .vote-btn {
    padding: 5px 14px;
    background: rgba(0, 100, 200, 0.6);
    border: 1px solid rgba(0, 150, 255, 0.4);
    border-radius: 4px;
    color: #aaddff;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .vote-btn:hover { background: rgba(0, 130, 255, 0.8); color: #fff; }
  .vote-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .status-label {
    color: #666;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .status-label.you { color: #00CCFF; }
  .status-label.dead-label { color: #884444; }

  .skip-row {
    text-align: center;
    margin-bottom: 12px;
  }
  .skip-btn {
    padding: 8px 30px;
    background: rgba(80, 80, 80, 0.6);
    border: 1px solid rgba(150, 150, 150, 0.4);
    border-radius: 6px;
    color: #ccc;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .skip-btn:hover { background: rgba(120, 120, 120, 0.7); color: #fff; }
  .skip-btn.disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }

  .footer {
    text-align: center;
    color: #888;
    font-size: 12px;
  }
  .footer .my-vote { color: #FFAA00; }

  .result-overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: none;
    align-items: center;
    justify-content: center;
    background: rgba(0, 0, 0, 0.85);
    z-index: 10;
  }
  .result-overlay.visible { display: flex; }
  .result-box {
    text-align: center;
    padding: 40px;
  }
  .result-box h2 { font-size: 28px; margin-bottom: 10px; }
  .result-box .eject { color: #FF4444; }
  .result-box .safe { color: #00FF88; }
  .result-box .role-reveal { color: #FFAA00; font-size: 16px; margin-top: 8px; }

  .vote-count {
    color: #FFAA00;
    font-size: 11px;
    margin-top: 4px;
    display: none;
  }
  .vote-count.visible { display: block; }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="voting-panel">
    <div class="header">
      <h1 id="title">EMERGENCY MEETING</h1>
      <div class="reason" id="reason"></div>
      <div class="timer" id="timer">0:45</div>
    </div>
    <div class="player-grid" id="player-grid"></div>
    <div class="skip-row">
      <button class="skip-btn" id="skip-btn" onclick="castVote(0)">SKIP VOTE</button>
    </div>
    <div class="footer">
      <span id="vote-status">Click a player to vote</span>
    </div>
  </div>
</div>

<div class="result-overlay" id="result-overlay">
  <div class="result-box" id="result-box"></div>
</div>

<script>
(function() {
  var timerEl = document.getElementById('timer');
  var gridEl = document.getElementById('player-grid');
  var skipBtn = document.getElementById('skip-btn');
  var statusEl = document.getElementById('vote-status');
  var reasonEl = document.getElementById('reason');
  var resultOverlay = document.getElementById('result-overlay');
  var resultBox = document.getElementById('result-box');

  var ZONE_NAMES = {
    '1': 'Bridge', '2': 'Engine Room', '3': 'Cargo Bay', '4': 'Med Bay',
    '5': 'Reactor', '6': 'Comms Array', '7': 'Airlock'
  };

  var MAX_SLOTS = 12;
  var MEETING_SPAWNS = {
    1: {x: 5.0, z: -34.0},
    2: {x: 4.3, z: -31.5},
    3: {x: 2.5, z: -29.7},
    4: {x: 0.0, z: -29.0},
    5: {x: -2.5, z: -29.7},
    6: {x: -4.3, z: -31.5},
    7: {x: -5.0, z: -34.0},
    8: {x: -4.3, z: -36.5},
    9: {x: -2.5, z: -38.3},
    10: {x: 0.0, z: -39.0},
    11: {x: 2.5, z: -38.3},
    12: {x: 4.3, z: -36.5}
  };

  reasonEl.textContent = 'Waiting for meeting data...';

  var voted = false;
  var myVote = -1;
  var selfName = '';
  var timerInterval = null;
  var timerDeadlineMs = 0;
  var voteCounts = new Array(MAX_SLOTS + 1).fill(0);
  var rosterBySlot = {};
  var tallyDispatched = false;
  var meetingResolved = false;

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str == null ? '' : String(str);
    return div.innerHTML;
  }

  function formatName(slot) {
    var entry = rosterBySlot[slot];
    return entry && entry.name ? entry.name : 'Open Slot ' + slot;
  }

  function resetRoster() {
    rosterBySlot = {};
    for (var i = 1; i <= MAX_SLOTS; i++) {
      rosterBySlot[i] = {
        name: '',
        present: false,
        alive: false,
        isSelf: false
      };
    }
  }

  function setButtonDisabled(btn, disabled) {
    if (!btn) return;
    btn.disabled = !!disabled;
    btn.classList.toggle('disabled', !!disabled);
  }

  function buildCards() {
    for (var i = 1; i <= MAX_SLOTS; i++) {
      var card = document.createElement('div');
      card.className = 'player-card dead';
      card.id = 'card-' + i;
      card.innerHTML =
        '<div class="player-name" id="name-' + i + '">Open Slot ' + i + '</div>' +
        '<div class="status-label dead-label" id="status-' + i + '">EMPTY</div>' +
        '<button class="vote-btn disabled" id="btn-' + i + '" onclick="castVote(' + i + ')">VOTE</button>' +
        '<div class="vote-count" id="vc-' + i + '">0 votes</div>';
      gridEl.appendChild(card);
    }
  }

  function updateVoteDisplay() {
    for (var i = 1; i <= MAX_SLOTS; i++) {
      var vc = document.getElementById('vc-' + i);
      if (!vc) continue;
      var count = voteCounts[i] || 0;
      vc.textContent = count + ' vote' + (count === 1 ? '' : 's');
      vc.classList.toggle('visible', count > 0);
    }
  }

  function updateRosterDisplay() {
    for (var i = 1; i <= MAX_SLOTS; i++) {
      var entry = rosterBySlot[i];
      var card = document.getElementById('card-' + i);
      var nameEl = document.getElementById('name-' + i);
      var statusLabel = document.getElementById('status-' + i);
      var btn = document.getElementById('btn-' + i);
      var isSelf = entry.present && selfName !== '' && entry.name === selfName;
      if (!card || !nameEl || !statusLabel || !btn) continue;

      nameEl.textContent = formatName(i);
      card.classList.toggle('dead', !entry.present || !entry.alive);
      card.classList.toggle('voted-for', voted && myVote === i);

      if (!entry.present) {
        statusLabel.textContent = 'EMPTY';
        statusLabel.className = 'status-label dead-label';
        btn.textContent = 'EMPTY';
        setButtonDisabled(btn, true);
        continue;
      }

      if (isSelf) {
        statusLabel.textContent = 'YOU';
        statusLabel.className = 'status-label you';
      } else {
        statusLabel.textContent = entry.alive ? 'ALIVE' : 'DEAD';
        statusLabel.className = 'status-label' + (entry.alive ? '' : ' dead-label');
      }

      btn.textContent = 'VOTE';
      setButtonDisabled(btn, voted || meetingResolved || !entry.alive);
    }

    setButtonDisabled(skipBtn, voted || meetingResolved);
  }

  function stopTimer() {
    if (timerInterval) {
      clearInterval(timerInterval);
      timerInterval = null;
    }
  }

  function renderTimer() {
    var remainingSeconds = Math.max(0, Math.ceil((timerDeadlineMs - Date.now()) / 1000));
    var minutes = Math.floor(remainingSeconds / 60);
    var seconds = remainingSeconds % 60;
    timerEl.textContent = minutes + ':' + (seconds < 10 ? '0' : '') + seconds;
    timerEl.classList.toggle('warning', remainingSeconds <= 10);
    if (remainingSeconds <= 0 && !voted && !meetingResolved) {
      castVote(0);
    }
  }

  function startTimer(durationSeconds) {
    timerDeadlineMs = Date.now() + durationSeconds * 1000;
    stopTimer();
    renderTimer();
    timerInterval = setInterval(renderTimer, 1000);
  }

  function getClosestMeetingSlot(position) {
    var closestSlot = 0;
    var closestDistanceSq = Infinity;
    for (var i = 1; i <= MAX_SLOTS; i++) {
      var spawn = MEETING_SPAWNS[i];
      var dx = position.x - spawn.x;
      var dz = position.z - spawn.z;
      var distanceSq = dx * dx + dz * dz;
      if (distanceSq < closestDistanceSq) {
        closestDistanceSq = distanceSq;
        closestSlot = i;
      }
    }
    if (closestDistanceSq > 16) {
      return 0;
    }
    return closestSlot;
  }

  function applyPositionRoster(posData) {
    if (!posData || typeof posData !== 'object') return;

    var nextRoster = {};
    for (var slot = 1; slot <= MAX_SLOTS; slot++) {
      nextRoster[slot] = {
        name: '',
        present: false,
        alive: false,
        isSelf: false,
        distanceSq: Infinity
      };
    }

    Object.keys(posData).forEach(function(username) {
      var position = posData[username];
      if (!position || typeof position.x !== 'number' || typeof position.z !== 'number') return;
      var slot = getClosestMeetingSlot(position);
      if (!slot) return;

      var spawn = MEETING_SPAWNS[slot];
      var dx = position.x - spawn.x;
      var dz = position.z - spawn.z;
      var distanceSq = dx * dx + dz * dz;

      if (distanceSq < nextRoster[slot].distanceSq) {
        nextRoster[slot] = {
          name: username,
          present: true,
          alive: true,
          isSelf: selfName !== '' && username === selfName,
          distanceSq: distanceSq
        };
      }
    });

    for (var i = 1; i <= MAX_SLOTS; i++) {
      rosterBySlot[i] = {
        name: nextRoster[i].name,
        present: nextRoster[i].present,
        alive: nextRoster[i].alive,
        isSelf: nextRoster[i].isSelf
      };
    }
    updateRosterDisplay();
  }

  function tryParseJson(raw) {
    try {
      return JSON.parse(raw);
    } catch (err) {
      return null;
    }
  }

  function resetMeetingState() {
    voted = false;
    myVote = -1;
    meetingResolved = false;
    tallyDispatched = false;
    voteCounts = new Array(MAX_SLOTS + 1).fill(0);
    resultOverlay.classList.remove('visible');
    resetRoster();
    updateVoteDisplay();
    updateRosterDisplay();
    statusEl.textContent = 'Click a player to vote';
    startTimer(45);
  }

  window.castVote = function(slot) {
    if (voted || meetingResolved) return;
    if (slot !== 0) {
      var target = rosterBySlot[slot];
      if (!target || !target.present || !target.alive) return;
    }

    voted = true;
    myVote = slot;

    PortalsSdk.sendMessageToUnity(JSON.stringify({
      TaskName: slot === 0 ? 'Cast_Vote_Skip' : 'Cast_Vote_' + slot,
      TaskTargetState: 'SetNotActiveToActive'
    }));

    updateRosterDisplay();
    if (slot === 0) {
      statusEl.innerHTML = '<span class="my-vote">You voted to SKIP</span>';
    } else {
      statusEl.innerHTML = '<span class="my-vote">You voted for ' + escapeHtml(formatName(slot)) + '</span>';
    }
  };

  function showResult(ejected, slot, role) {
    stopTimer();
    meetingResolved = true;
    updateRosterDisplay();

    if (ejected) {
      var roleText = role === 1 ? 'SABOTEUR' : 'CREW';
      var roleColor = role === 1 ? '#FF4444' : '#00CCFF';
      resultBox.innerHTML =
        '<h2 class="eject">' + escapeHtml(formatName(slot)) + ' was ejected!</h2>' +
        '<div class="role-reveal">They were: <span style="color:' + roleColor + '">' + roleText + '</span></div>';
    } else {
      resultBox.innerHTML =
        '<h2 class="safe">No one was ejected.</h2>' +
        '<div class="role-reveal">Tie vote or skip majority</div>';
    }
    resultOverlay.classList.add('visible');
  }

  buildCards();
  resetRoster();
  updateRosterDisplay();
  renderTimer();

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      renderTimer();
      if (!meetingResolved && timerDeadlineMs > 0 && !timerInterval) {
        timerInterval = setInterval(renderTimer, 1000);
      }
    }
  });

  window.addEventListener('focus', function() {
    renderTimer();
    if (!meetingResolved && timerDeadlineMs > 0 && !timerInterval) {
      timerInterval = setInterval(renderTimer, 1000);
    }
  });

  var lastMsgId = '';
  var lastMsgTime = 0;

  PortalsSdk.setMessageListener(function(message) {
    var now = Date.now();
    var messageKey = (typeof message === 'string' ? message : JSON.stringify(message)) + '_' + Math.floor(now / 100);
    if (messageKey === lastMsgId && now - lastMsgTime < 200) return;
    lastMsgId = messageKey;
    lastMsgTime = now;

    var msg = typeof message === 'string' ? message : JSON.stringify(message);

    if (msg.startsWith('meeting_self_')) {
      selfName = msg.substring('meeting_self_'.length);
      updateRosterDisplay();
      return;
    }

    if (msg.startsWith('meeting_start_')) {
      var parts = msg.split('_');
      var meetingReason = parts[2] || '1';
      var bodyZone = parts[3] || '0';
      if (meetingReason === '1') {
        reasonEl.textContent = 'Body reported in: ' + (ZONE_NAMES[bodyZone] || 'Unknown');
      } else {
        reasonEl.textContent = 'Emergency button pressed';
      }
      resetMeetingState();
      return;
    }

    if (msg.startsWith('pos_')) {
      var posPayload = tryParseJson(msg.substring(4));
      if (posPayload) {
        applyPositionRoster(posPayload);
      }
      return;
    }

    if (msg.startsWith('tally_')) {
      var tallyParts = msg.split('_');
      for (var i = 1; i <= MAX_SLOTS; i++) {
        voteCounts[i] = parseFloat(tallyParts[i]) || 0;
      }
      var skipCount = parseFloat(tallyParts[MAX_SLOTS + 1]) || 0;
      updateVoteDisplay();

      if (tallyDispatched) return;
      tallyDispatched = true;

      var maxVotes = 0;
      var maxSlot = -1;
      var tie = false;
      for (var slot = 1; slot <= MAX_SLOTS; slot++) {
        if (voteCounts[slot] > maxVotes) {
          maxVotes = voteCounts[slot];
          maxSlot = slot;
          tie = false;
        } else if (voteCounts[slot] === maxVotes && voteCounts[slot] > 0) {
          tie = true;
        }
      }

      statusEl.textContent = 'Vote tallied. Waiting for ejection result...';
      if (tie || skipCount >= maxVotes || maxVotes === 0) {
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName: 'No_Ejection',
          TaskTargetState: 'SetNotActiveToActive'
        }));
      } else {
        PortalsSdk.sendMessageToUnity(JSON.stringify({
          TaskName: 'Eject_Player_' + maxSlot,
          TaskTargetState: 'SetNotActiveToActive'
        }));
      }
      return;
    }

    if (msg.startsWith('eject_')) {
      var ejectParts = msg.split('_');
      if (ejectParts[1] === 'none') {
        showResult(false, 0, 0);
      } else {
        showResult(true, parseInt(ejectParts[1], 10), parseInt(ejectParts[2], 10) || 0);
      }
      return;
    }

    if (msg === 'game_reset' || msg.startsWith('game_over_')) {
      stopTimer();
    }
  });
})();
</script>
</body>
</html>
