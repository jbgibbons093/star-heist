<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Security Log</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    pointer-events: none;
  }

  .log-panel {
    position: fixed;
    top: 80px;
    right: 20px;
    width: 340px;
    max-height: 420px;
    background: rgba(8, 12, 30, 0.92);
    border: 1px solid rgba(79, 195, 247, 0.2);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    pointer-events: auto;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(79, 195, 247, 0.06);
    overflow: hidden;
  }

  .log-header {
    padding: 12px 16px;
    border-bottom: 1px solid rgba(79, 195, 247, 0.12);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .log-title {
    color: #4FC3F7;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }
  .log-status {
    font-size: 11px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-weight: 600;
  }
  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #66BB6A;
    box-shadow: 0 0 6px rgba(102, 187, 106, 0.5);
    transition: all 0.3s;
  }
  .status-dot.offline {
    background: #EF5350;
    box-shadow: 0 0 6px rgba(239, 83, 80, 0.5);
  }
  .status-text {
    color: #66BB6A;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .status-text.offline { color: #EF5350; }

  .log-entries {
    flex: 1;
    overflow-y: auto;
    padding: 6px 0;
    max-height: 340px;
  }
  .log-entries::-webkit-scrollbar { width: 3px; }
  .log-entries::-webkit-scrollbar-track { background: transparent; }
  .log-entries::-webkit-scrollbar-thumb { background: rgba(79, 195, 247, 0.2); border-radius: 2px; }

  .log-entry {
    padding: 5px 16px;
    font-size: 12px;
    color: rgba(255, 255, 255, 0.6);
    display: flex;
    align-items: center;
    gap: 8px;
    animation: entryIn 0.3s ease;
  }
  .log-entry:hover {
    background: rgba(79, 195, 247, 0.04);
  }

  @keyframes entryIn {
    from { opacity: 0; transform: translateX(8px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .log-time {
    color: rgba(255, 255, 255, 0.3);
    font-size: 11px;
    font-weight: 600;
    min-width: 36px;
    font-variant-numeric: tabular-nums;
  }
  .log-player {
    color: rgba(255, 255, 255, 0.85);
    font-weight: 600;
    flex-shrink: 0;
  }
  .log-arrow {
    color: rgba(255, 255, 255, 0.2);
    font-size: 10px;
  }
  .log-zone {
    color: #4FC3F7;
    font-weight: 600;
  }

  .player-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .offline-overlay {
    display: none;
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(10, 6, 8, 0.92);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    border-radius: 16px;
    z-index: 5;
    backdrop-filter: blur(4px);
    gap: 8px;
  }
  .offline-overlay.visible { display: flex; }

  .offline-icon {
    font-size: 32px;
    opacity: 0.6;
  }
  .offline-text {
    color: #EF5350;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .offline-sub {
    color: rgba(239, 83, 80, 0.5);
    font-size: 12px;
    font-weight: 600;
  }
  .glitch {
    animation: glitch 0.3s infinite;
  }
  @keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 1px); }
    40% { transform: translate(2px, -1px); }
    60% { transform: translate(-1px, 2px); }
    80% { transform: translate(1px, -2px); }
    100% { transform: translate(0); }
  }

  .empty-state {
    padding: 24px 16px;
    text-align: center;
    color: rgba(255, 255, 255, 0.2);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="log-panel">
  <div class="log-header">
    <span class="log-title">Security Log</span>
    <div class="log-status">
      <span class="status-dot" id="status-dot"></span>
      <span class="status-text" id="status-text">ONLINE</span>
    </div>
  </div>
  <div class="log-entries" id="log-entries">
    <div class="empty-state" id="empty-state">Monitoring crew movement...</div>
  </div>
  <div class="offline-overlay" id="offline-overlay">
    <div class="offline-icon glitch">&#9888;</div>
    <div class="offline-text">Signal Lost</div>
    <div class="offline-sub">Comms array offline</div>
  </div>
</div>

<script>
(function() {
  var entriesEl = document.getElementById('log-entries');
  var emptyState = document.getElementById('empty-state');
  var statusDot = document.getElementById('status-dot');
  var statusText = document.getElementById('status-text');
  var offlineOverlay = document.getElementById('offline-overlay');

  var online = true;
  var playerZones = {}; // {username: zoneName}
  var gameStartTime = Date.now();
  var maxEntries = 100;
  var entryCount = 0;

  // Player colors for dots
  var PLAYER_COLORS = [
    '#EF5350', '#4FC3F7', '#66BB6A', '#FFD54F',
    '#AB47BC', '#FF7043', '#26C6DA', '#EC407A',
    '#8D6E63', '#78909C', '#9CCC65', '#FFCA28'
  ];
  var playerColorMap = {};
  var nextColorIdx = 0;

  function getPlayerColor(name) {
    if (!playerColorMap[name]) {
      playerColorMap[name] = PLAYER_COLORS[nextColorIdx % PLAYER_COLORS.length];
      nextColorIdx++;
    }
    return playerColorMap[name];
  }

  // Zone boundaries (Unity coords, center + half-size)
  var ZONES = [
    {name: 'Lobby',   cx: 0,   cz: 0,    hw: 10, hd: 10},
    {name: 'Bridge',  cx: 0,   cz: -34,  hw: 8,  hd: 8},
    {name: 'Airlock', cx: 0,   cz: -62,  hw: 8,  hd: 8},
    {name: 'Engine',  cx: -34, cz: 0,    hw: 8,  hd: 8},
    {name: 'MedBay',  cx: 34,  cz: 0,    hw: 8,  hd: 8},
    {name: 'Cargo',   cx: -34, cz: 34,   hw: 8,  hd: 8},
    {name: 'Comms',   cx: 0,   cz: 34,   hw: 8,  hd: 8},
    {name: 'Reactor', cx: 34,  cz: 34,   hw: 8,  hd: 8},
  ];

  var CORRIDORS = [
    {name: 'Corridor LB',  cx: 0,   cz: -17, hw: 3,  hd: 9},
    {name: 'Corridor BA',  cx: 0,   cz: -48, hw: 3,  hd: 10},
    {name: 'Corridor LE',  cx: -17, cz: 0,   hw: 9,  hd: 3},
    {name: 'Corridor LM',  cx: 17,  cz: 0,   hw: 9,  hd: 3},
    {name: 'Corridor LC',  cx: 0,   cz: 17,  hw: 3,  hd: 9},
    {name: 'Corridor EC',  cx: -34, cz: 17,  hw: 3,  hd: 9},
    {name: 'Corridor MR',  cx: 34,  cz: 17,  hw: 3,  hd: 9},
  ];

  function detectZone(x, z) {
    for (var i = 0; i < ZONES.length; i++) {
      var zone = ZONES[i];
      if (Math.abs(x - zone.cx) <= zone.hw && Math.abs(z - zone.cz) <= zone.hd) {
        return zone.name;
      }
    }
    for (var j = 0; j < CORRIDORS.length; j++) {
      var c = CORRIDORS[j];
      if (Math.abs(x - c.cx) <= c.hw && Math.abs(z - c.cz) <= c.hd) {
        return c.name;
      }
    }
    return 'Unknown';
  }

  function getTimeStr() {
    var elapsed = Math.floor((Date.now() - gameStartTime) / 1000);
    var remaining = Math.max(0, 480 - elapsed);
    var m = Math.floor(remaining / 60);
    var s = remaining % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function addEntry(playerName, zoneName) {
    if (!online) return;
    if (emptyState) { emptyState.style.display = 'none'; }
    var entry = document.createElement('div');
    entry.className = 'log-entry';
    var color = getPlayerColor(playerName);
    entry.innerHTML =
      '<span class="player-dot" style="background:' + color + ';box-shadow:0 0 4px ' + color + '"></span>' +
      '<span class="log-time">' + getTimeStr() + '</span>' +
      '<span class="log-player">' + escapeHtml(playerName) + '</span>' +
      '<span class="log-arrow">&#8594;</span>' +
      '<span class="log-zone">' + zoneName + '</span>';
    entriesEl.insertBefore(entry, emptyState ? emptyState.nextSibling : entriesEl.firstChild);
    entryCount++;
    while (entryCount > maxEntries) {
      entriesEl.removeChild(entriesEl.lastChild);
      entryCount--;
    }
  }

  function escapeHtml(str) {
    var div = document.createElement('div');
    div.textContent = str;
    return div.innerHTML;
  }

  function setOnline(isOnline) {
    online = isOnline;
    if (isOnline) {
      statusDot.classList.remove('offline');
      statusText.classList.remove('offline');
      statusText.textContent = 'ONLINE';
      offlineOverlay.classList.remove('visible');
    } else {
      statusDot.classList.add('offline');
      statusText.classList.add('offline');
      statusText.textContent = 'OFFLINE';
      offlineOverlay.classList.add('visible');
    }
  }

  function processPositions(posData) {
    if (typeof posData !== 'object' || posData === null) return;
    for (var username in posData) {
      if (!posData.hasOwnProperty(username)) continue;
      var p = posData[username];
      if (!p || typeof p.x !== 'number') continue;
      var zone = detectZone(p.x, p.z);
      var prevZone = playerZones[username];
      if (zone !== prevZone) {
        playerZones[username] = zone;
        if (prevZone !== undefined) {
          addEntry(username, zone);
        }
      }
    }
  }

  // Message handler
  var lastMsgId = '';
  var lastMsgTime = 0;

  PortalsSdk.setMessageListener(function(message) {
    var now = Date.now();
    var msgId = (typeof message === 'string' ? message.substring(0, 50) : '') + '_' + Math.floor(now / 100);
    if (msgId === lastMsgId && now - lastMsgTime < 200) return;
    lastMsgId = msgId;
    lastMsgTime = now;

    var msg = typeof message === 'string' ? message : JSON.stringify(message);

    // pos_{positionData}
    if (msg.startsWith('pos_')) {
      var posStr = msg.substring(4);
      try {
        var posData = JSON.parse(posStr);
        processPositions(posData);
      } catch(e) {}
      return;
    }

    // comms_0 or comms_1
    if (msg === 'comms_0' || msg === 'comms_down') {
      setOnline(false);
      return;
    }
    if (msg === 'comms_1' || msg === 'comms_repaired') {
      setOnline(true);
      return;
    }

    // game_start resets timer reference
    if (msg.startsWith('game_start_')) {
      gameStartTime = Date.now();
      entriesEl.innerHTML = '';
      if (emptyState) { entriesEl.appendChild(emptyState); emptyState.style.display = ''; }
      entryCount = 0;
      playerZones = {};
      playerColorMap = {};
      nextColorIdx = 0;
      setOnline(true);
      return;
    }

    // game_reset
    if (msg === 'game_reset') {
      entriesEl.innerHTML = '';
      if (emptyState) { entriesEl.appendChild(emptyState); emptyState.style.display = ''; }
      entryCount = 0;
      playerZones = {};
      return;
    }
  });
})();
</script>
</body>
</html>
