<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Heist Lobby</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 100%;
    height: 100%;
    background: transparent !important;
    overflow: visible;
    pointer-events: none;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    color: #e0e8ff;
  }

  .panel {
    position: fixed;
    right: 16px;
    bottom: 16px;
    width: min(340px, calc(100vw - 32px));
    max-height: calc(100vh - 32px);
    overflow: auto;
    padding: 20px;
    background: linear-gradient(135deg, rgba(10, 15, 40, 0.94), rgba(15, 20, 50, 0.90));
    border: 1px solid rgba(79, 195, 247, 0.2);
    border-radius: 16px;
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.5),
      0 0 1px rgba(79, 195, 247, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    pointer-events: auto;
    animation: panelIn 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4FC3F7, transparent);
    border-radius: 16px 16px 0 0;
  }

  @keyframes panelIn {
    from { opacity: 0; transform: translateY(12px) scale(0.97); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }

  .eyebrow {
    font-size: 10px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(79, 195, 247, 0.6);
    font-weight: 600;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 20px;
    font-weight: 800;
    color: #4FC3F7;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }

  .subtitle {
    color: rgba(200, 210, 240, 0.5);
    font-size: 12px;
    font-weight: 400;
    line-height: 1.4;
    margin-bottom: 16px;
  }

  .stats {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat {
    padding: 10px 12px;
    border-radius: 12px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
  }
  .stat-label {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2px;
    color: rgba(160, 180, 220, 0.5);
    font-weight: 600;
    margin-bottom: 4px;
  }
  .stat-value {
    font-size: 22px;
    font-weight: 800;
    color: #e0e8ff;
  }
  .stat-value.highlight { color: #4FC3F7; }
  .stat-value.launching { color: #FFD54F; }
  .stat-value.live { color: #66BB6A; }

  .roster {
    margin-bottom: 14px;
  }
  .roster-label {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(160, 180, 220, 0.5);
    font-weight: 600;
    margin-bottom: 8px;
  }
  .roster-list {
    display: flex;
    flex-direction: column;
    gap: 4px;
    max-height: 200px;
    overflow-y: auto;
  }
  .roster-list::-webkit-scrollbar { width: 3px; }
  .roster-list::-webkit-scrollbar-track { background: transparent; }
  .roster-list::-webkit-scrollbar-thumb { background: rgba(79, 195, 247, 0.2); border-radius: 2px; }

  .roster-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    border-radius: 10px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.05);
    transition: all 0.2s ease;
  }
  .roster-row.self {
    border-color: rgba(79, 195, 247, 0.3);
    background: rgba(79, 195, 247, 0.08);
  }
  .roster-name {
    font-size: 13px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .roster-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #66BB6A;
    box-shadow: 0 0 6px rgba(102, 187, 106, 0.4);
  }
  .roster-tag {
    font-size: 10px;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(160, 180, 220, 0.4);
    font-weight: 600;
  }
  .roster-tag.you { color: rgba(79, 195, 247, 0.7); }

  .empty {
    padding: 20px 10px;
    text-align: center;
    color: rgba(160, 180, 220, 0.3);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    border: 1px dashed rgba(255, 255, 255, 0.08);
    border-radius: 10px;
  }

  .status {
    min-height: 18px;
    margin-bottom: 12px;
    color: #FFD54F;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  .actions {
    display: flex;
    gap: 8px;
  }
  button {
    border: none;
    border-radius: 12px;
    padding: 12px 16px;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    cursor: pointer;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    transition: all 0.25s ease;
  }
  .primary {
    flex: 1;
    background: rgba(79, 195, 247, 0.15);
    border: 1px solid rgba(79, 195, 247, 0.3);
    color: #4FC3F7;
  }
  .primary:hover:not(:disabled) {
    background: rgba(79, 195, 247, 0.25);
    border-color: rgba(79, 195, 247, 0.5);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(79, 195, 247, 0.15);
  }
  .secondary {
    background: rgba(255, 255, 255, 0.05);
    border: 1px solid rgba(255, 255, 255, 0.08);
    color: rgba(200, 210, 240, 0.6);
  }
  .secondary:hover {
    background: rgba(255, 255, 255, 0.08);
    border-color: rgba(255, 255, 255, 0.15);
  }
  button:disabled {
    cursor: default;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="panel" id="panel">
  <div class="eyebrow">Star Heist</div>
  <h1>Mission Briefing</h1>
  <div class="subtitle">Sync up with your crew, then launch the mission.</div>

  <div class="stats">
    <div class="stat">
      <div class="stat-label">Crew</div>
      <div class="stat-value highlight" id="player-count">0</div>
    </div>
    <div class="stat">
      <div class="stat-label">Status</div>
      <div class="stat-value" id="lobby-state">Idle</div>
    </div>
  </div>

  <div class="roster">
    <div class="roster-label">Roster</div>
    <div class="roster-list" id="roster-list">
      <div class="empty">Awaiting crew sync...</div>
    </div>
  </div>

  <div class="status" id="status">Explore the ship, then start when ready.</div>

  <div class="actions">
    <button class="primary" id="start-btn">Launch</button>
    <button class="secondary" id="close-btn">Close</button>
  </div>
</div>

<script>
(function() {
  var playerCountEl = document.getElementById('player-count');
  var lobbyStateEl = document.getElementById('lobby-state');
  var rosterListEl = document.getElementById('roster-list');
  var statusEl = document.getElementById('status');
  var startBtn = document.getElementById('start-btn');
  var closeBtn = document.getElementById('close-btn');

  var roster = {};
  var selfName = '';
  var countdownEndMs = 0;
  var countdownTimer = null;
  var gamePhase = 0;
  var lastMsgId = '';
  var lastMsgTime = 0;

  function canUseSdkSend() {
    return typeof PortalsSdk !== 'undefined' &&
      PortalsSdk &&
      typeof PortalsSdk.sendMessageToUnity === 'function';
  }

  function sendTask(taskName) {
    var payload = JSON.stringify({
      TaskName: taskName,
      TaskTargetState: 'SetNotActiveToActive'
    });
    if (canUseSdkSend()) {
      PortalsSdk.sendMessageToUnity(payload);
      return true;
    }
    if (window.parent && typeof window.parent.postMessage === 'function') {
      window.parent.postMessage({ type: 'generic', message: payload }, '*');
      return true;
    }
    return false;
  }

  function closeOverlay() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.closeIframe === 'function') {
      PortalsSdk.closeIframe();
    }
  }

  function focusGameKeyboard() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.focusGameKeyboard === 'function') {
      PortalsSdk.focusGameKeyboard();
    }
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function sortedNames() {
    return Object.keys(roster).sort(function(a, b) {
      return a.localeCompare(b);
    });
  }

  function updateRoster() {
    var names = sortedNames();
    playerCountEl.textContent = String(names.length);
    if (!names.length) {
      rosterListEl.innerHTML = '<div class="empty">Awaiting crew sync...</div>';
      return;
    }
    rosterListEl.innerHTML = names.map(function(name) {
      var isSelf = name === selfName;
      var rowClass = isSelf ? 'roster-row self' : 'roster-row';
      var tagClass = isSelf ? 'roster-tag you' : 'roster-tag';
      var tag = isSelf ? 'you' : 'crew';
      return '<div class="' + rowClass + '">' +
        '<div class="roster-name"><span class="roster-dot"></span>' + escapeHtml(name) + '</div>' +
        '<div class="' + tagClass + '">' + tag + '</div>' +
        '</div>';
    }).join('');
  }

  function escapeHtml(text) {
    return text.replace(/[&<>"]/g, function(char) {
      if (char === '&') return '&amp;';
      if (char === '<') return '&lt;';
      if (char === '>') return '&gt;';
      return '&quot;';
    });
  }

  function setLobbyState(phase) {
    gamePhase = parseInt(phase, 10) || 0;
    if (gamePhase === 0) {
      lobbyStateEl.textContent = countdownEndMs > 0 ? 'Launching' : 'Idle';
      lobbyStateEl.className = countdownEndMs > 0 ? 'stat-value launching' : 'stat-value';
      startBtn.disabled = countdownEndMs > 0;
      return;
    }
    lobbyStateEl.textContent = 'Live';
    lobbyStateEl.className = 'stat-value live';
    startBtn.disabled = true;
    setStatus('Mission already in progress.');
    closeOverlay();
  }

  function clearCountdown() {
    countdownEndMs = 0;
    if (countdownTimer) {
      clearInterval(countdownTimer);
      countdownTimer = null;
    }
    if (gamePhase === 0) {
      lobbyStateEl.textContent = 'Idle';
      lobbyStateEl.className = 'stat-value';
      startBtn.disabled = false;
    }
  }

  function renderCountdown() {
    if (!countdownEndMs) return;
    var remaining = Math.max(0, Math.ceil((countdownEndMs - Date.now()) / 1000));
    lobbyStateEl.textContent = 'Launching';
    lobbyStateEl.className = 'stat-value launching';
    startBtn.disabled = true;
    setStatus('Mission begins in ' + remaining + '...');
    if (remaining <= 0) {
      clearCountdown();
      setStatus('Mission launched.');
    }
  }

  function startCountdown(seconds) {
    countdownEndMs = Date.now() + (seconds * 1000);
    renderCountdown();
    if (countdownTimer) clearInterval(countdownTimer);
    countdownTimer = setInterval(renderCountdown, 250);
  }

  function processMessage(message) {
    var now = Date.now();
    var msgId = (typeof message === 'string' ? message : JSON.stringify(message)) + '_' + Math.floor(now / 100);
    if (msgId === lastMsgId && now - lastMsgTime < 200) return;
    lastMsgId = msgId;
    lastMsgTime = now;

    var msg = typeof message === 'string' ? message : JSON.stringify(message);

    if (msg.indexOf('pos_') === 0) {
      try {
        roster = JSON.parse(msg.substring(4)) || {};
        updateRoster();
      } catch (error) {}
      return;
    }

    if (msg.indexOf('meeting_self_') === 0) {
      selfName = msg.substring('meeting_self_'.length);
      updateRoster();
      return;
    }

    if (msg.indexOf('lobby_state_') === 0) {
      setLobbyState(msg.substring('lobby_state_'.length));
      return;
    }

    if (msg.indexOf('countdown_') === 0) {
      startCountdown(parseInt(msg.split('_')[1], 10) || 5);
      return;
    }

    if (msg.indexOf('game_start_') === 0) {
      setStatus('Mission launched.');
      closeOverlay();
      return;
    }

    if (msg === 'game_reset') {
      clearCountdown();
      setLobbyState(0);
      setStatus('Round reset. Regroup and launch again.');
    }
  }

  function setupListener() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.setMessageListener === 'function') {
      PortalsSdk.setMessageListener(processMessage);
      return;
    }
    setTimeout(setupListener, 150);
  }

  window.addEventListener('message', function(event) {
    if (typeof event.data === 'string') processMessage(event.data);
    else if (event.data && typeof event.data.message === 'string') processMessage(event.data.message);
    else if (event.data && typeof event.data.portalsMessage === 'string') processMessage(event.data.portalsMessage);
  });

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) renderCountdown();
  });

  window.addEventListener('focus', renderCountdown);

  startBtn.addEventListener('click', function() {
    if (startBtn.disabled) return;
    if (sendTask('BeginLobbyCountdown')) {
      startBtn.disabled = true;
      setStatus('Requesting launch sequence...');
    } else {
      setStatus('Portals link unavailable. Try reopening.');
    }
    setTimeout(focusGameKeyboard, 50);
  });

  closeBtn.addEventListener('click', function() {
    closeOverlay();
    setTimeout(focusGameKeyboard, 50);
  });

  document.addEventListener('click', function(event) {
    if (event.target.closest && event.target.closest('button')) return;
    focusGameKeyboard();
  });

  document.addEventListener('mouseup', function(event) {
    if (event.target.closest && event.target.closest('button')) return;
    setTimeout(focusGameKeyboard, 50);
  });

  document.addEventListener('keydown', function() {
    focusGameKeyboard();
  });

  setupListener();
  focusGameKeyboard();
  setTimeout(focusGameKeyboard, 100);
  setTimeout(focusGameKeyboard, 300);
  setTimeout(focusGameKeyboard, 600);
})();
</script>
</body>
</html>
