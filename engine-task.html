<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Engine Calibration</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    background: linear-gradient(160deg, rgba(12, 18, 45, 0.97), rgba(8, 12, 35, 0.97));
    border: 1px solid rgba(80, 140, 255, 0.15);
    border-radius: 20px;
    padding: 24px 32px 28px;
    width: 420px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.6),
      0 0 1px rgba(100, 160, 255, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #4FC3F7, transparent);
  }

  .eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: #4FC3F7;
    font-weight: 700;
    margin-bottom: 4px;
  }
  h1 {
    color: #e0e8ff;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .desc {
    color: rgba(180, 195, 230, 0.6);
    font-size: 12px;
    margin-bottom: 20px;
  }

  .slider-row {
    margin-bottom: 16px;
  }
  .slider-label {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 6px;
  }
  .slider-name {
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: rgba(180, 195, 230, 0.5);
  }
  .slider-value {
    font-size: 13px;
    font-weight: 700;
    color: #e0e8ff;
    font-variant-numeric: tabular-nums;
  }
  .slider-value.matched { color: #66BB6A; }

  .track {
    position: relative;
    width: 100%;
    height: 32px;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(80, 140, 255, 0.1);
    border-radius: 8px;
    cursor: pointer;
    overflow: hidden;
    touch-action: none;
  }

  .target-zone {
    position: absolute;
    top: 2px;
    bottom: 2px;
    background: rgba(102, 187, 106, 0.12);
    border: 1px solid rgba(102, 187, 106, 0.25);
    border-radius: 4px;
    pointer-events: none;
  }

  .thumb {
    position: absolute;
    top: 2px;
    bottom: 2px;
    width: 14px;
    background: linear-gradient(180deg, #4FC3F7, #2196F3);
    border-radius: 4px;
    pointer-events: none;
    transition: background 0.2s;
    box-shadow: 0 0 8px rgba(79, 195, 247, 0.3);
  }
  .thumb.matched {
    background: linear-gradient(180deg, #66BB6A, #43A047);
    box-shadow: 0 0 12px rgba(102, 187, 106, 0.4);
  }

  .status {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: rgba(180, 195, 230, 0.5);
    margin-top: 16px;
    min-height: 20px;
    transition: color 0.3s;
  }
  .status.done {
    color: #66BB6A;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 1px;
  }

  .close-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    color: rgba(180, 195, 230, 0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .close-btn:hover {
    background: rgba(255, 255, 255, 0.1);
    color: #e0e8ff;
  }
</style>
</head>
<body>

<div class="overlay">
  <div class="panel">
    <button class="close-btn" onclick="closeTask()">CLOSE</button>
    <div class="eyebrow">Propulsion</div>
    <h1>Engine Calibration</h1>
    <div class="desc">Align each frequency band to the green target zone.</div>

    <div id="sliders"></div>
    <div class="status" id="status">Drag sliders to match targets</div>
  </div>
</div>

<script>
(function() {
  var BANDS = [
    { name: 'Band Alpha', target: 0.65, tolerance: 0.08 },
    { name: 'Band Beta', target: 0.30, tolerance: 0.08 },
    { name: 'Band Gamma', target: 0.82, tolerance: 0.08 },
  ];

  var values = [0.15, 0.50, 0.45];
  var completed = false;
  var container = document.getElementById('sliders');
  var statusEl = document.getElementById('status');

  function pct(v) { return Math.round(v * 100); }

  function isMatched(i) {
    return Math.abs(values[i] - BANDS[i].target) <= BANDS[i].tolerance;
  }

  function allMatched() {
    for (var i = 0; i < BANDS.length; i++) {
      if (!isMatched(i)) return false;
    }
    return true;
  }

  function render() {
    container.innerHTML = '';
    for (var i = 0; i < BANDS.length; i++) {
      var band = BANDS[i];
      var matched = isMatched(i);
      var row = document.createElement('div');
      row.className = 'slider-row';

      var tzLeft = (band.target - band.tolerance) * 100;
      var tzWidth = band.tolerance * 2 * 100;
      var thumbLeft = values[i] * 100;

      row.innerHTML =
        '<div class="slider-label">' +
          '<span class="slider-name">' + band.name + '</span>' +
          '<span class="slider-value' + (matched ? ' matched' : '') + '">' + pct(values[i]) + ' / ' + pct(band.target) + '</span>' +
        '</div>' +
        '<div class="track" data-idx="' + i + '">' +
          '<div class="target-zone" style="left:' + tzLeft + '%;width:' + tzWidth + '%"></div>' +
          '<div class="thumb' + (matched ? ' matched' : '') + '" style="left:calc(' + thumbLeft + '% - 7px)"></div>' +
        '</div>';
      container.appendChild(row);
    }
  }

  function handleDrag(track, idx, clientX) {
    if (completed) return;
    var rect = track.getBoundingClientRect();
    var ratio = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
    values[idx] = ratio;
    render();

    if (allMatched()) {
      completed = true;
      statusEl.textContent = 'CALIBRATION COMPLETE';
      statusEl.className = 'status done';
      sendComplete();
    }
  }

  container.addEventListener('pointerdown', function(e) {
    var track = e.target.closest('.track');
    if (!track || completed) return;
    var idx = parseInt(track.dataset.idx);
    e.preventDefault();
    track.setPointerCapture(e.pointerId);
    handleDrag(track, idx, e.clientX);

    function onMove(ev) { handleDrag(track, idx, ev.clientX); }
    function onUp() {
      track.removeEventListener('pointermove', onMove);
      track.removeEventListener('pointerup', onUp);
      track.removeEventListener('pointercancel', onUp);
    }
    track.addEventListener('pointermove', onMove);
    track.addEventListener('pointerup', onUp);
    track.addEventListener('pointercancel', onUp);
  });

  function sendComplete() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.sendMessageToUnity === 'function') {
      PortalsSdk.sendMessageToUnity(JSON.stringify({
        TaskName: 'Engine_Complete',
        TaskTargetState: 'SetNotActiveToActive'
      }));
    }
    setTimeout(closeTask, 800);
  }

  window.closeTask = function() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.closeIframe === 'function') {
      PortalsSdk.closeIframe();
    }
  };

  render();
})();
</script>
</body>
</html>
