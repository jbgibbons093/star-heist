<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MedBay Diagnostic</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
  }

  .overlay {
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .panel {
    background: linear-gradient(160deg, rgba(12, 18, 45, 0.97), rgba(8, 12, 35, 0.97));
    border: 1px solid rgba(80, 140, 255, 0.15);
    border-radius: 20px;
    padding: 24px 32px 28px;
    width: 380px;
    position: relative;
    overflow: hidden;
    box-shadow:
      0 8px 40px rgba(0, 0, 0, 0.6),
      0 0 1px rgba(100, 160, 255, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.04);
  }
  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, #66BB6A, transparent);
  }

  .eyebrow {
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 2.5px;
    color: #66BB6A;
    font-weight: 700;
    margin-bottom: 4px;
  }
  h1 {
    color: #e0e8ff;
    font-size: 20px;
    font-weight: 800;
    margin-bottom: 4px;
  }
  .desc {
    color: rgba(180, 195, 230, 0.6);
    font-size: 12px;
    margin-bottom: 18px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }

  .cell {
    aspect-ratio: 1;
    border-radius: 12px;
    border: 1px solid rgba(80, 140, 255, 0.1);
    background: rgba(255, 255, 255, 0.03);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.2s;
    user-select: none;
    -webkit-user-select: none;
  }
  .cell:hover:not(.locked) {
    background: rgba(80, 140, 255, 0.08);
    border-color: rgba(80, 140, 255, 0.2);
  }
  .cell.flash {
    background: rgba(102, 187, 106, 0.25);
    border-color: rgba(102, 187, 106, 0.5);
    box-shadow: 0 0 16px rgba(102, 187, 106, 0.2);
  }
  .cell.selected {
    background: rgba(79, 195, 247, 0.2);
    border-color: rgba(79, 195, 247, 0.4);
    box-shadow: 0 0 12px rgba(79, 195, 247, 0.15);
  }
  .cell.correct {
    background: rgba(102, 187, 106, 0.2);
    border-color: rgba(102, 187, 106, 0.4);
    box-shadow: 0 0 12px rgba(102, 187, 106, 0.2);
  }
  .cell.wrong {
    background: rgba(239, 83, 80, 0.2);
    border-color: rgba(239, 83, 80, 0.4);
    animation: shake 0.3s ease;
  }
  .cell.locked {
    cursor: default;
    pointer-events: none;
  }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-4px); }
    75% { transform: translateX(4px); }
  }

  .status {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: rgba(180, 195, 230, 0.5);
    min-height: 20px;
    transition: color 0.3s;
  }
  .status.memorize { color: #FFD54F; }
  .status.done { color: #66BB6A; font-size: 15px; font-weight: 700; letter-spacing: 1px; }
  .status.fail { color: #EF5350; }

  .close-btn {
    position: absolute;
    top: 14px; right: 16px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 8px;
    color: rgba(180, 195, 230, 0.5);
    font-family: 'Outfit', sans-serif;
    font-size: 11px;
    font-weight: 600;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.5px;
    transition: all 0.2s;
  }
  .close-btn:hover { background: rgba(255, 255, 255, 0.1); color: #e0e8ff; }
</style>
</head>
<body>

<div class="overlay">
  <div class="panel">
    <button class="close-btn" onclick="closeTask()">CLOSE</button>
    <div class="eyebrow">Medical</div>
    <h1>Patient Diagnostic</h1>
    <div class="desc">Memorize the pattern, then reproduce it.</div>

    <div class="grid" id="grid"></div>
    <div class="status" id="status">Watch the pattern...</div>
  </div>
</div>

<script>
(function() {
  var ICONS = ['\u2661','\u2662','\u2664','\u263B','\u2606','\u2604','\u2618','\u2602','\u2709'];
  var gridEl = document.getElementById('grid');
  var statusEl = document.getElementById('status');
  var cells = [];
  var pattern = [];
  var playerPicks = [];
  var phase = 'wait';
  var completed = false;

  function shuffle(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
    }
    return arr;
  }

  function pickPattern() {
    var indices = [0,1,2,3,4,5,6,7,8];
    shuffle(indices);
    return indices.slice(0, 4);
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    cells = [];
    for (var i = 0; i < 9; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell';
      cell.textContent = ICONS[i];
      cell.dataset.idx = i;
      cell.addEventListener('click', onCellClick);
      gridEl.appendChild(cell);
      cells.push(cell);
    }
  }

  function flashPattern() {
    phase = 'flash';
    statusEl.textContent = 'Memorize the highlighted cells...';
    statusEl.className = 'status memorize';
    for (var i = 0; i < 9; i++) cells[i].classList.add('locked');

    pattern.forEach(function(idx) { cells[idx].classList.add('flash'); });

    setTimeout(function() {
      pattern.forEach(function(idx) { cells[idx].classList.remove('flash'); });
      phase = 'input';
      statusEl.textContent = 'Now select the 4 cells';
      statusEl.className = 'status';
      for (var i = 0; i < 9; i++) cells[i].classList.remove('locked');
    }, 1800);
  }

  function onCellClick(e) {
    if (phase !== 'input' || completed) return;
    var idx = parseInt(e.currentTarget.dataset.idx);
    if (playerPicks.indexOf(idx) !== -1) return;

    playerPicks.push(idx);
    e.currentTarget.classList.add('selected');

    if (playerPicks.length === 4) {
      checkResult();
    }
  }

  function checkResult() {
    phase = 'check';
    var correct = true;
    for (var i = 0; i < 4; i++) {
      if (pattern.indexOf(playerPicks[i]) === -1) { correct = false; break; }
    }

    if (correct) {
      completed = true;
      for (var i = 0; i < 9; i++) cells[i].classList.remove('selected');
      pattern.forEach(function(idx) { cells[idx].classList.add('correct'); });
      statusEl.textContent = 'DIAGNOSTIC COMPLETE';
      statusEl.className = 'status done';
      sendComplete();
    } else {
      statusEl.textContent = 'Wrong pattern — try again';
      statusEl.className = 'status fail';
      for (var i = 0; i < 9; i++) {
        cells[i].classList.remove('selected');
        if (playerPicks.indexOf(i) !== -1 && pattern.indexOf(i) === -1) {
          cells[i].classList.add('wrong');
        }
      }
      setTimeout(function() {
        for (var i = 0; i < 9; i++) cells[i].classList.remove('wrong');
        playerPicks = [];
        flashPattern();
      }, 1200);
    }
  }

  function sendComplete() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.sendMessageToUnity === 'function') {
      PortalsSdk.sendMessageToUnity(JSON.stringify({
        TaskName: 'MedBay_Complete',
        TaskTargetState: 'SetNotActiveToActive'
      }));
    }
    setTimeout(closeTask, 800);
  }

  window.closeTask = function() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.closeIframe === 'function') {
      PortalsSdk.closeIframe();
    }
  };

  buildGrid();
  pattern = pickPattern();
  setTimeout(flashPattern, 400);
})();
</script>
</body>
</html>
