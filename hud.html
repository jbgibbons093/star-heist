<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Star Heist HUD</title>
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: transparent; overflow: hidden; font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif; }

  .hud {
    display: flex;
    align-items: center;
    gap: 0;
    padding: 0;
    background: linear-gradient(135deg, rgba(10, 15, 40, 0.92), rgba(15, 20, 50, 0.88));
    border: 1px solid rgba(80, 140, 255, 0.2);
    border-radius: 16px;
    color: #e0e8ff;
    font-size: 14px;
    width: fit-content;
    margin: 8px auto 0;
    box-shadow:
      0 4px 24px rgba(0, 0, 0, 0.5),
      0 0 1px rgba(100, 160, 255, 0.3),
      inset 0 1px 0 rgba(255, 255, 255, 0.05);
    backdrop-filter: blur(12px);
    overflow: hidden;
  }

  .hud-section {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 18px;
    white-space: nowrap;
    position: relative;
  }
  .hud-section + .hud-section {
    border-left: 1px solid rgba(80, 140, 255, 0.12);
  }

  /* ── Role Badge ── */
  .role-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 5px 14px;
    border-radius: 20px;
    font-weight: 700;
    font-size: 13px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    transition: all 0.4s ease;
  }
  .role-icon {
    font-size: 16px;
    line-height: 1;
  }
  .role-crew {
    background: linear-gradient(135deg, #1565C0, #1E88E5);
    color: #E3F2FD;
    box-shadow: 0 2px 8px rgba(21, 101, 192, 0.4);
  }
  .role-saboteur {
    background: linear-gradient(135deg, #C62828, #E53935);
    color: #FFEBEE;
    box-shadow: 0 2px 8px rgba(198, 40, 40, 0.4);
    animation: sabGlow 2s ease-in-out infinite;
  }
  .role-unknown {
    background: rgba(60, 70, 100, 0.6);
    color: #90A4C8;
    box-shadow: none;
  }

  /* ── Timer ── */
  .timer-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .timer-icon {
    font-size: 18px;
    opacity: 0.7;
  }
  .timer {
    font-size: 22px;
    font-weight: 800;
    color: #E0E8FF;
    min-width: 54px;
    text-align: center;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .timer.warning { color: #FFB74D; }
  .timer.danger {
    color: #EF5350;
    animation: timerPulse 1s ease-in-out infinite;
  }

  /* ── Alive Count ── */
  .alive-wrap {
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .alive-icon { font-size: 16px; }
  .alive-count {
    font-size: 18px;
    font-weight: 700;
    color: #66BB6A;
    transition: color 0.3s;
  }
  .alive-label {
    font-size: 11px;
    color: rgba(160, 180, 220, 0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }

  /* ── Task Progress ── */
  .task-section {
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .task-bar-wrap {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .task-label-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
  }
  .task-label {
    font-size: 11px;
    color: rgba(160, 180, 220, 0.6);
    text-transform: uppercase;
    letter-spacing: 1px;
    font-weight: 600;
  }
  .task-count {
    font-size: 13px;
    font-weight: 700;
    color: #FFD54F;
  }
  .task-bar {
    width: 120px;
    height: 6px;
    background: rgba(255, 255, 255, 0.08);
    border-radius: 3px;
    overflow: hidden;
  }
  .task-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, #FFD54F, #FFC107);
    border-radius: 3px;
    width: 0%;
    transition: width 0.6s ease;
    box-shadow: 0 0 8px rgba(255, 193, 7, 0.3);
  }

  /* ── Notification ── */
  .notification {
    position: fixed;
    top: 70px;
    left: 50%;
    transform: translateX(-50%) translateY(-10px);
    background: linear-gradient(135deg, rgba(10, 15, 40, 0.95), rgba(20, 25, 55, 0.95));
    border: 1px solid rgba(255, 183, 77, 0.4);
    border-radius: 12px;
    padding: 10px 24px;
    color: #FFD54F;
    font-size: 15px;
    font-weight: 700;
    letter-spacing: 0.5px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 20px rgba(255, 183, 77, 0.1);
    text-align: center;
    max-width: 500px;
  }
  .notification.visible {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Notification variants */
  .notification.danger-notif {
    border-color: rgba(239, 83, 80, 0.5);
    color: #EF5350;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 20px rgba(239, 83, 80, 0.15);
  }
  .notification.success-notif {
    border-color: rgba(102, 187, 106, 0.4);
    color: #66BB6A;
    box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5), 0 0 20px rgba(102, 187, 106, 0.1);
  }

  /* ── Phase Visibility ── */
  .phase-lobby .timer-section { display: none; }
  .phase-lobby .task-section { display: none; }
  .phase-lobby .alive-section { display: none; }
  .phase-game_over .task-section { display: none; }

  /* ── Animations ── */
  @keyframes timerPulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.6; transform: scale(1.05); }
  }
  @keyframes sabGlow {
    0%, 100% { box-shadow: 0 2px 8px rgba(198, 40, 40, 0.4); }
    50% { box-shadow: 0 2px 16px rgba(198, 40, 40, 0.7); }
  }
</style>
</head>
<body>
<div id="hud" class="hud phase-lobby">
  <div class="hud-section">
    <span id="role-badge" class="role-badge role-unknown">
      <span class="role-icon" id="role-icon">&#9679;</span>
      <span id="role-text">LOBBY</span>
    </span>
  </div>
  <div class="hud-section timer-section">
    <div class="timer-wrap">
      <span class="timer-icon">&#9202;</span>
      <span id="timer" class="timer">8:00</span>
    </div>
  </div>
  <div class="hud-section alive-section">
    <div class="alive-wrap">
      <span class="alive-icon">&#128100;</span>
      <span id="alive-count" class="alive-count">--</span>
    </div>
  </div>
  <div class="hud-section task-section">
    <div class="task-bar-wrap">
      <div class="task-label-row">
        <span class="task-label">Tasks</span>
        <span id="task-progress" class="task-count">0/0</span>
      </div>
      <div class="task-bar">
        <div id="task-bar-fill" class="task-bar-fill"></div>
      </div>
    </div>
  </div>
</div>

<div id="notification" class="notification"></div>

<script>
(function() {
  // ── State ──
  var gamePhase = 'lobby';
  var role = 0;
  var aliveCount = 0;
  var tasksCompleted = 0;
  var tasksRequired = 0;
  var timerRemainingMs = 480000;
  var timerEndMs = 0;
  var timerInterval = null;
  var meetingPaused = false;
  var timerExpired = false;
  var lobbyCountdownEndMs = 0;
  var lobbyCountdownTimeout = null;
  var lobbyCountdownSent = false;
  var meltdownEndMs = 0;
  var meltdownTimeout = null;
  var meltdownTriggered = false;
  var pendingUnityTasks = [];
  var sdkFlushInterval = null;
  var lastMsgId = '';
  var lastMsgTime = 0;

  // ── DOM ──
  var hudEl = document.getElementById('hud');
  var roleBadge = document.getElementById('role-badge');
  var roleIcon = document.getElementById('role-icon');
  var roleText = document.getElementById('role-text');
  var timerEl = document.getElementById('timer');
  var aliveEl = document.getElementById('alive-count');
  var taskEl = document.getElementById('task-progress');
  var taskBarFill = document.getElementById('task-bar-fill');
  var notifEl = document.getElementById('notification');

  // ── Read URL params ──
  var params = new URLSearchParams(window.location.search);
  var initialPhase = params.get('phase') || 'lobby';
  setPhase(initialPhase);

  // ── Timer ──
  function formatTime(sec) {
    var m = Math.floor(sec / 60);
    var s = sec % 60;
    return m + ':' + (s < 10 ? '0' : '') + s;
  }

  function updateTimerDisplay() {
    var timerSeconds = Math.max(0, Math.ceil(timerRemainingMs / 1000));
    timerEl.textContent = formatTime(timerSeconds);
    timerEl.className = 'timer';
    if (timerSeconds <= 60) timerEl.classList.add('danger');
    else if (timerSeconds <= 120) timerEl.classList.add('warning');
  }

  function syncTimerFromClock() {
    if (!meetingPaused && timerEndMs > 0) {
      timerRemainingMs = Math.max(0, timerEndMs - Date.now());
    }
    updateTimerDisplay();
    if (timerRemainingMs <= 0 && !timerExpired) {
      timerExpired = true;
      stopTimer();
      sendTaskToUnity('Time_Expired');
    }
  }

  function canUseSdkSend() {
    return typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.sendMessageToUnity === 'function';
  }

  function canUseParentSend() {
    return typeof window !== 'undefined' && window.parent && typeof window.parent.postMessage === 'function';
  }

  function canSendToUnity() {
    return canUseSdkSend() || canUseParentSend();
  }

  function sendUnityMessage(payload) {
    if (canUseSdkSend()) { PortalsSdk.sendMessageToUnity(payload); return true; }
    if (canUseParentSend()) { window.parent.postMessage({ type: 'generic', message: payload }, '*'); return true; }
    return false;
  }

  function ensureSdkFlushLoop() {
    if (sdkFlushInterval) return;
    sdkFlushInterval = setInterval(function() {
      if (!pendingUnityTasks.length) return;
      flushPendingUnityTasks();
      if (!pendingUnityTasks.length) { clearInterval(sdkFlushInterval); sdkFlushInterval = null; }
    }, 250);
  }

  function flushPendingUnityTasks() {
    if (!canSendToUnity()) return;
    while (pendingUnityTasks.length) {
      var taskName = pendingUnityTasks.shift();
      sendUnityMessage(JSON.stringify({ TaskName: taskName, TaskTargetState: 'SetNotActiveToActive' }));
    }
  }

  function sendTaskToUnity(taskName) {
    var payload = JSON.stringify({ TaskName: taskName, TaskTargetState: 'SetNotActiveToActive' });
    if (!sendUnityMessage(payload)) {
      if (pendingUnityTasks.indexOf(taskName) === -1) pendingUnityTasks.push(taskName);
      ensureSdkFlushLoop();
      return;
    }
  }

  function ensureTimerLoop() {
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(syncTimerFromClock, 1000);
  }

  function startTimer() {
    timerExpired = false;
    timerEndMs = Date.now() + timerRemainingMs;
    syncTimerFromClock();
    ensureTimerLoop();
  }

  function stopTimer() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
  }

  function pauseTimer() {
    if (meetingPaused) return;
    syncTimerFromClock();
    meetingPaused = true;
    timerEndMs = 0;
    stopTimer();
    updateTimerDisplay();
  }

  function resumeTimer() {
    if (!meetingPaused || timerRemainingMs <= 0 || timerExpired) return;
    meetingPaused = false;
    timerEndMs = Date.now() + timerRemainingMs;
    syncTimerFromClock();
    ensureTimerLoop();
  }

  function resetTimer(seconds) {
    timerRemainingMs = seconds * 1000;
    timerEndMs = 0;
    timerExpired = false;
    updateTimerDisplay();
  }

  function clearLobbyCountdown() {
    lobbyCountdownEndMs = 0;
    lobbyCountdownSent = false;
    if (lobbyCountdownTimeout) { clearTimeout(lobbyCountdownTimeout); lobbyCountdownTimeout = null; }
  }

  function syncLobbyCountdown() {
    if (lobbyCountdownSent || lobbyCountdownEndMs <= 0 || gamePhase !== 'lobby') return;
    var remainingMs = lobbyCountdownEndMs - Date.now();
    if (remainingMs <= 0) {
      lobbyCountdownSent = true;
      lobbyCountdownEndMs = 0;
      if (lobbyCountdownTimeout) { clearTimeout(lobbyCountdownTimeout); lobbyCountdownTimeout = null; }
      sendTaskToUnity('GameStart');
      return;
    }
    if (lobbyCountdownTimeout) clearTimeout(lobbyCountdownTimeout);
    lobbyCountdownTimeout = setTimeout(syncLobbyCountdown, remainingMs);
  }

  function startLobbyCountdown(seconds) {
    lobbyCountdownSent = false;
    lobbyCountdownEndMs = Date.now() + (seconds * 1000);
    showNotification('Game starts in ' + seconds + '...', Math.max(4500, seconds * 1000));
    syncLobbyCountdown();
  }

  function clearMeltdownCountdown() {
    meltdownEndMs = 0;
    meltdownTriggered = false;
    if (meltdownTimeout) { clearTimeout(meltdownTimeout); meltdownTimeout = null; }
  }

  function syncMeltdownCountdown() {
    if (meltdownTriggered || meltdownEndMs <= 0) return;
    var remainingMs = meltdownEndMs - Date.now();
    if (remainingMs <= 0) {
      meltdownTriggered = true;
      meltdownEndMs = 0;
      if (meltdownTimeout) { clearTimeout(meltdownTimeout); meltdownTimeout = null; }
      sendTaskToUnity('SaboteursWin_Meltdown');
      return;
    }
    if (meltdownTimeout) clearTimeout(meltdownTimeout);
    meltdownTimeout = setTimeout(syncMeltdownCountdown, remainingMs);
  }

  function startMeltdownCountdown(seconds) {
    meltdownTriggered = false;
    meltdownEndMs = Date.now() + (seconds * 1000);
    showNotification('REACTOR MELTDOWN! ' + seconds + ' SECONDS!', 5000, 'danger');
    syncMeltdownCountdown();
  }

  // ── Phase Management ──
  function setPhase(phase) {
    gamePhase = phase;
    hudEl.className = 'hud phase-' + phase;
  }

  // ── Role Display ──
  function updateRole(newRole) {
    role = newRole;
    if (role === 1) {
      roleText.textContent = 'SABOTEUR';
      roleIcon.innerHTML = '&#9760;';
      roleBadge.className = 'role-badge role-saboteur';
    } else if (gamePhase === 'playing' || gamePhase === 'meeting') {
      roleText.textContent = 'CREW';
      roleIcon.innerHTML = '&#9733;';
      roleBadge.className = 'role-badge role-crew';
    } else {
      roleText.textContent = 'LOBBY';
      roleIcon.innerHTML = '&#9679;';
      roleBadge.className = 'role-badge role-unknown';
    }
  }

  // ── Task Progress Bar ──
  function updateTaskBar() {
    var pct = tasksRequired > 0 ? Math.min(100, (tasksCompleted / tasksRequired) * 100) : 0;
    taskBarFill.style.width = pct + '%';
    taskEl.textContent = Math.round(tasksCompleted) + '/' + Math.round(tasksRequired);
  }

  // ── Notification ──
  var notifTimeout = null;
  function showNotification(text, duration, variant) {
    duration = duration || 3000;
    notifEl.textContent = text;
    notifEl.className = 'notification visible';
    if (variant === 'danger') notifEl.classList.add('danger-notif');
    else if (variant === 'success') notifEl.classList.add('success-notif');
    if (notifTimeout) clearTimeout(notifTimeout);
    notifTimeout = setTimeout(function() {
      notifEl.classList.remove('visible');
    }, duration);
  }

  function handleMessage(message) {
    flushPendingUnityTasks();

    var now = Date.now();
    var messageKey = (typeof message === 'string' ? message : JSON.stringify(message)) + '_' + Math.floor(now / 100);
    if (messageKey === lastMsgId && now - lastMsgTime < 200) return;
    lastMsgId = messageKey;
    lastMsgTime = now;

    var msg = message;
    if (typeof message === 'string') {
      try { msg = JSON.parse(message); } catch(e) { msg = message; }
    }
    var msgStr = typeof msg === 'string' ? msg : JSON.stringify(msg);

    if (msgStr.startsWith('game_start_')) {
      clearLobbyCountdown();
      clearMeltdownCountdown();
      var parts = msgStr.split('_');
      tasksRequired = parseFloat(parts[2]) || 20;
      aliveCount = parseFloat(parts[3]) || 8;
      tasksCompleted = 0;
      resetTimer(480);
      meetingPaused = false;
      setPhase('playing');
      updateRole(role);
      aliveEl.textContent = aliveCount;
      updateTaskBar();
      startTimer();
      return;
    }

    if (msgStr.startsWith('countdown_')) {
      var secs = parseInt(msgStr.split('_')[1]);
      startLobbyCountdown(secs);
      return;
    }

    if (msgStr.startsWith('task_')) {
      var parts = msgStr.split('_');
      tasksCompleted = parseFloat(parts[1]) || 0;
      tasksRequired = parseFloat(parts[2]) || tasksRequired;
      updateTaskBar();
      return;
    }

    if (msgStr.startsWith('player_killed_')) {
      aliveCount = parseFloat(msgStr.split('_')[2]) || aliveCount;
      aliveEl.textContent = aliveCount;
      return;
    }

    if (msgStr.startsWith('meeting_start_')) {
      pauseTimer();
      setPhase('meeting');
      showNotification('EMERGENCY MEETING!', 5000, 'danger');
      return;
    }

    if (msgStr === 'meeting_end') {
      setPhase('playing');
      resumeTimer();
      return;
    }

    if (msgStr.startsWith('game_over_')) {
      clearLobbyCountdown();
      clearMeltdownCountdown();
      stopTimer();
      setPhase('game_over');
      var reason = msgStr.replace('game_over_', '');
      if (reason.startsWith('crew')) {
        showNotification('CREW WINS!', 10000, 'success');
      } else {
        showNotification('SABOTEURS WIN!', 10000, 'danger');
      }
      return;
    }

    if (msgStr === 'game_reset') {
      clearLobbyCountdown();
      clearMeltdownCountdown();
      stopTimer();
      resetTimer(480);
      meetingPaused = false;
      tasksCompleted = 0;
      tasksRequired = 0;
      aliveCount = 0;
      role = 0;
      setPhase('lobby');
      updateRole(0);
      aliveEl.textContent = '--';
      updateTaskBar();
      return;
    }

    if (msgStr.startsWith('role_')) {
      var r = parseInt(msgStr.split('_')[1]);
      updateRole(r);
      return;
    }

    if (msgStr.startsWith('sab_cooldown_')) { return; }

    if (msgStr === 'lights_out') { showNotification('LIGHTS OUT!', 5000, 'danger'); return; }
    if (msgStr === 'lights_on') { showNotification('Lights restored', 2000, 'success'); return; }

    if (msgStr === 'comms_down') { showNotification('Communications disrupted!', 4000, 'danger'); return; }
    if (msgStr === 'comms_repaired') { showNotification('Comms Array repaired!', 3000, 'success'); return; }

    if (msgStr === 'sabotage_reactor_leak') { showNotification('REACTOR LEAK DETECTED!', 5000, 'danger'); return; }
    if (msgStr === 'sabotage_atmo_breach') { showNotification('ATMOSPHERE BREACH!', 5000, 'danger'); return; }
    if (msgStr === 'meltdown_start') { startMeltdownCountdown(30); return; }
    if (msgStr === 'meltdown_stopped') { clearMeltdownCountdown(); showNotification('Reactor stabilized', 3000, 'success'); return; }

    if (msgStr.startsWith('kz_warn_')) {
      var zone = msgStr.replace('kz_warn_', '').toUpperCase();
      showNotification('WARNING: ' + zone + ' LETHAL ZONE!', 3000, 'danger');
      return;
    }
  }

  function setupMessageListener() {
    if (typeof PortalsSdk !== 'undefined' && PortalsSdk && typeof PortalsSdk.setMessageListener === 'function') {
      PortalsSdk.setMessageListener(function(message) { handleMessage(message); });
      flushPendingUnityTasks();
    } else {
      setTimeout(setupMessageListener, 250);
    }
  }

  window.addEventListener('message', function(event) {
    if (typeof event.data === 'string') handleMessage(event.data);
    else if (event.data && event.data.portalsMessage) handleMessage(event.data.portalsMessage);
    else if (event.data && event.data.message && typeof event.data.message === 'string') handleMessage(event.data.message);
  });

  setupMessageListener();

  setTimeout(function() { console.log('[HUD] Ready'); }, 300);

  document.addEventListener('visibilitychange', function() {
    if (!document.hidden) {
      flushPendingUnityTasks();
      syncLobbyCountdown();
      syncMeltdownCountdown();
      syncTimerFromClock();
      if (!meetingPaused && timerEndMs > 0 && !timerExpired) ensureTimerLoop();
    }
  });

  window.addEventListener('focus', function() {
    flushPendingUnityTasks();
    syncLobbyCountdown();
    syncMeltdownCountdown();
    syncTimerFromClock();
    if (!meetingPaused && timerEndMs > 0 && !timerExpired) ensureTimerLoop();
  });
})();
</script>
</body>
</html>
