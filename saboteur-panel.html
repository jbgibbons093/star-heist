<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Saboteur Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
<script src="https://portals-labs.github.io/portals-sdk/portals-sdk.js?v=10005456"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent;
    overflow: hidden;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    pointer-events: none;
  }

  .panel {
    position: fixed;
    bottom: 14px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 10px;
    padding: 10px 16px;
    background: rgba(30, 8, 12, 0.92);
    border: 1px solid rgba(239, 83, 80, 0.25);
    border-radius: 16px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    pointer-events: auto;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(239, 83, 80, 0.08);
  }

  .panel.hidden { display: none; }

  .cat-btn {
    position: relative;
    padding: 10px 18px;
    background: rgba(239, 83, 80, 0.1);
    border: 1px solid rgba(239, 83, 80, 0.2);
    border-radius: 12px;
    color: #EF5350;
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    cursor: pointer;
    transition: all 0.25s ease;
    min-width: 110px;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }
  .cat-btn:hover:not(.disabled) {
    background: rgba(239, 83, 80, 0.2);
    border-color: rgba(239, 83, 80, 0.4);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(239, 83, 80, 0.15);
  }
  .cat-btn.active {
    background: rgba(239, 83, 80, 0.3);
    border-color: #EF5350;
    color: #fff;
    box-shadow: 0 0 16px rgba(239, 83, 80, 0.25);
  }
  .cat-btn.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    color: rgba(239, 83, 80, 0.5);
  }

  .cat-icon {
    font-size: 18px;
    line-height: 1;
  }

  .cooldown-text {
    display: block;
    font-size: 10px;
    font-weight: 600;
    color: rgba(239, 83, 80, 0.5);
    letter-spacing: 1px;
  }
  .cat-btn:not(.disabled) .cooldown-text { color: #66BB6A; }
  .cat-btn.disabled .cooldown-text { color: #EF5350; }

  /* Cooldown ring overlay */
  .cd-ring {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    border-radius: 12px;
    overflow: hidden;
    pointer-events: none;
  }
  .cd-ring::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0;
    width: 100%;
    height: 0%;
    background: rgba(239, 83, 80, 0.08);
    transition: height 1s linear;
  }

  .submenu {
    position: fixed;
    bottom: 76px;
    left: 50%;
    transform: translateX(-50%);
    display: none;
    flex-wrap: wrap;
    gap: 8px;
    padding: 10px 14px;
    background: rgba(20, 6, 10, 0.96);
    border: 1px solid rgba(239, 83, 80, 0.2);
    border-radius: 14px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    max-width: 520px;
    justify-content: center;
    pointer-events: auto;
    box-shadow: 0 4px 24px rgba(0, 0, 0, 0.5);
    animation: submenuIn 0.2s ease;
  }
  .submenu.visible { display: flex; }

  @keyframes submenuIn {
    from { opacity: 0; transform: translateX(-50%) translateY(6px); }
    to { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  .sub-btn {
    padding: 8px 16px;
    background: rgba(239, 83, 80, 0.08);
    border: 1px solid rgba(239, 83, 80, 0.15);
    border-radius: 10px;
    color: rgba(255, 200, 200, 0.85);
    font-family: 'Outfit', 'Segoe UI', system-ui, sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
    letter-spacing: 0.5px;
  }
  .sub-btn:hover {
    background: rgba(239, 83, 80, 0.25);
    border-color: rgba(239, 83, 80, 0.4);
    color: #fff;
    transform: translateY(-1px);
  }
</style>
</head>
<body>

<div id="panel" class="panel">
  <button class="cat-btn" data-cat="trap" onclick="toggleCategory('trap')">
    <span class="cat-icon">&#9889;</span>
    TRAP
    <span class="cooldown-text" id="cd-trap">READY</span>
    <div class="cd-ring"></div>
  </button>
  <button class="cat-btn" data-cat="killzone" onclick="toggleCategory('killzone')">
    <span class="cat-icon">&#9760;</span>
    KILL ZONE
    <span class="cooldown-text" id="cd-kz">READY</span>
    <div class="cd-ring"></div>
  </button>
  <button class="cat-btn" data-cat="sabotage" onclick="toggleCategory('sabotage')">
    <span class="cat-icon">&#9888;</span>
    SABOTAGE
    <span class="cooldown-text" id="cd-sab">READY</span>
    <div class="cd-ring"></div>
  </button>
</div>

<div id="submenu" class="submenu"></div>

<script>
(function() {
  var panel = document.getElementById('panel');
  var submenu = document.getElementById('submenu');
  var activeCategory = null;
  var cooldownSeconds = 0;
  var cooldownInterval = null;

  var ACTIONS = {
    trap: [
      {label: 'Corridor A', task: 'Arm_Trap_CorridorA'},
      {label: 'Corridor B', task: 'Arm_Trap_CorridorB'},
      {label: 'Corridor C', task: 'Arm_Trap_CorridorC'},
      {label: 'MedBay Entry', task: 'Arm_Trap_MedBayEntry'},
      {label: 'Cargo Entry', task: 'Arm_Trap_CargoEntry'},
      {label: 'Engine Entry', task: 'Arm_Trap_EngineEntry'},
    ],
    killzone: [
      {label: 'Engine Room', task: 'Activate_KZ_EngineRoom'},
      {label: 'Med Bay', task: 'Activate_KZ_MedBay'},
      {label: 'Cargo Bay', task: 'Activate_KZ_CargoBay'},
      {label: 'Reactor', task: 'Activate_KZ_Reactor'},
    ],
    sabotage: [
      {label: 'Reactor Leak', task: 'Activate_ReactorLeak'},
      {label: 'Atmo Breach', task: 'Activate_AtmoBreach'},
      {label: 'Lights Out', task: 'Activate_LightsOut'},
      {label: 'Comms Down', task: 'Sabotage_Comms'},
      {label: 'Reactor Meltdown', task: 'Sabotage_Reactor_Meltdown'},
    ],
  };

  window.toggleCategory = function(cat) {
    if (cooldownSeconds > 0) return;
    if (activeCategory === cat) {
      activeCategory = null;
      submenu.classList.remove('visible');
      document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
      return;
    }
    activeCategory = cat;
    document.querySelectorAll('.cat-btn').forEach(function(b) {
      b.classList.toggle('active', b.dataset.cat === cat);
    });
    renderSubmenu(cat);
  };

  function renderSubmenu(cat) {
    submenu.innerHTML = '';
    ACTIONS[cat].forEach(function(action) {
      var btn = document.createElement('button');
      btn.className = 'sub-btn';
      btn.textContent = action.label;
      btn.onclick = function() { executeAction(action.task); };
      submenu.appendChild(btn);
    });
    submenu.classList.add('visible');
  }

  function executeAction(taskName) {
    PortalsSdk.sendMessageToUnity(JSON.stringify({
      TaskName: taskName,
      TaskTargetState: 'SetNotActiveToActive'
    }));
    activeCategory = null;
    submenu.classList.remove('visible');
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('active'); });
    startCooldown(30);
  }

  function startCooldown(seconds) {
    cooldownSeconds = seconds;
    if (cooldownInterval) clearInterval(cooldownInterval);
    updateCooldownDisplay();
    document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.add('disabled'); });
    cooldownInterval = setInterval(function() {
      cooldownSeconds--;
      updateCooldownDisplay();
      if (cooldownSeconds <= 0) {
        clearInterval(cooldownInterval);
        cooldownInterval = null;
        document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('disabled'); });
      }
    }, 1000);
  }

  function updateCooldownDisplay() {
    var text = cooldownSeconds > 0 ? cooldownSeconds + 's' : 'READY';
    document.getElementById('cd-trap').textContent = text;
    document.getElementById('cd-kz').textContent = text;
    document.getElementById('cd-sab').textContent = text;
  }

  // Message dedup
  var lastMsgId = '';
  var lastMsgTime = 0;

  PortalsSdk.setMessageListener(function(message) {
    var now = Date.now();
    var msgId = message + '_' + Math.floor(now / 100);
    if (msgId === lastMsgId && now - lastMsgTime < 200) return;
    lastMsgId = msgId;
    lastMsgTime = now;

    var msg = typeof message === 'string' ? message : JSON.stringify(message);

    // sab_cooldown_{seconds}
    if (msg.startsWith('sab_cooldown_')) {
      var secs = parseInt(msg.split('_')[2]);
      if (secs > 0 && secs !== cooldownSeconds) startCooldown(secs);
      return;
    }

    // meeting_start — hide panel
    if (msg.startsWith('meeting_start_')) {
      panel.classList.add('hidden');
      submenu.classList.remove('visible');
      activeCategory = null;
      return;
    }

    // meeting_end — show panel
    if (msg === 'meeting_end') {
      panel.classList.remove('hidden');
      cooldownSeconds = 0;
      if (cooldownInterval) { clearInterval(cooldownInterval); cooldownInterval = null; }
      updateCooldownDisplay();
      document.querySelectorAll('.cat-btn').forEach(function(b) { b.classList.remove('disabled'); });
      return;
    }

    // game_reset or game_over — hide panel
    if (msg === 'game_reset' || msg.startsWith('game_over_')) {
      panel.classList.add('hidden');
      submenu.classList.remove('visible');
      return;
    }
  });
})();
</script>
</body>
</html>
